name: Deploy To Minikube

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify cluster tools
        shell: powershell
        run: |
          kubectl version --client
          minikube version
          minikube status
          minikube addons enable ingress

      - name: Build images inside minikube
        shell: powershell
        run: |
          minikube image build -t nisit-client:latest ./client
          minikube image build -t nisit-server:latest ./server

      - name: Apply Kubernetes manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollouts
        shell: powershell
        run: |
          kubectl rollout status deployment/postgres --timeout=180s
          kubectl rollout status deployment/nisit-server --timeout=180s
          kubectl rollout status deployment/nisit-client --timeout=180s
          kubectl get pods,svc,ingress

      - name: Run database migrations
        shell: powershell
        run: |
          kubectl delete pod nisit-migrate --ignore-not-found=true
          kubectl run nisit-migrate --restart=Never --image=nisit-server:latest --env="DATABASE_URL=postgresql://postgres:password@postgres:5432/nisit?sslmode=disable" --command -- node scripts/migrate.js
          kubectl wait --for=condition=Succeeded pod/nisit-migrate --timeout=300s
          kubectl logs nisit-migrate
          kubectl delete pod nisit-migrate --ignore-not-found=true

