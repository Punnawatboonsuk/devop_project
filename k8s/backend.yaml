apiVersion: apps/v1
kind: Deployment
metadata:
  name: nisit-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nisit-server
  template:
    metadata:
      labels:
        app: nisit-server
    spec:
      containers:
        - name: server
          image: nisit-server
          imagePullPolicy: Never
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
            - name: DATABASE_URL
              value: postgresql://postgres:password@postgres:5432/nisit
            - name: FRONTEND_URL
              value: http://nisit-uat.local
            - name: CORS_ORIGIN
              value: http://nisit-uat.local
            - name: GOOGLE_CALLBACK_URL
              value: http://nisit-uat.local/api/auth/google/callback
            - name: SESSION_COOKIE_SECURE
              value: "false"
            - name: SESSION_SECRET
              value: change-this-before-final-demo
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: nisit-server
spec:
  selector:
    app: nisit-server
  ports:
    - port: 5000
      targetPort: 5000
