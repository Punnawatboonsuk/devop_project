apiVersion: apps/v1
kind: Deployment
metadata:
  name: nisit-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nisit-client
  template:
    metadata:
      labels:
        app: nisit-client
    spec:
      containers:
        - name: client
          image: nisit-client
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nisit-client
spec:
  selector:
    app: nisit-client
  ports:
    - port: 80
      targetPort: 80